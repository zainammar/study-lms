<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}My Courses{% endblock %}</title>
</head>
<body>

    <!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style>

* {
    margin: 10;
    padding: 10;
    box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
}

.topnav {
  overflow: hidden;
  background-color: #333;
}

.topnav a {
  float: left;
  display: block;
  color: #f2f2f2;
  text-align: center;
  padding: 14px 16px;
  text-decoration: none;
  font-size: 17px;
}

.topnav a:hover {
  background-color: #ddd;
  color: black;
}

.topnav a.active {
  background-color: #04AA6D;
  color: white;
}

.topnav .icon {
  display: none;
}

@media screen and (max-width: 600px) {
  .topnav a:not(:first-child) {display: none;}
  .topnav a.icon {
    float: right;
    display: block;
  }
}

@media screen and (max-width: 600px) {
  .topnav.responsive {position: relative;}
  .topnav.responsive .icon {
    position: absolute;
    right: 0;
    top: 0;
  }
  .topnav.responsive a {
    float: none;
    display: block;
    text-align: left;
  }
  .current-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin: 10px 0;
            border: 3px solid #2196F3;
        }

}


</style>

<style>
  .container {
    display: grid;
    grid-template-columns: 60% 30% 10%;
    padding: 10px;
  }
  .container div {
    padding: 10px;
    font-size: 30px;
    text-align: center;

  }

  .container1 {
    display: grid;
    grid-template-columns: auto;
    padding: 10px;
  }
  .container1 div {
    padding: 10px;
    font-size: 20px;
    text-align: center;

  }
  .current-image {
            width:100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #2196F3;
        }
  .text-1{
    color: rgb(9, 1, 66);
    font-size: 16px;
    text-align: center;
  }

  </style>
</head>
<!-- -->
<body>
  <div class="container1">
    <div>
      <h1> 📚  Study Learning Management System</h1>
    </div>
   
    </div>

  <div class="container">
  
    <div>
  
    
<div class="topnav" id="myTopnav">
     


  <a href="http://127.0.0.1:8000/dashboard/" class="active">Home</a>
  <a href="http://127.0.0.1:8000/signup/">Signup</a>
  <a href="http://127.0.0.1:8000/login/">Login</a>
  <a href="http://127.0.0.1:8000/logout/">Logout</a>
  <a href="http://127.0.0.1:8000/profile/">Edit Profile</a>
  <a href="http://127.0.0.1:8000/users/">All Users</a>



  
  <a href="javascript:void(0);" class="icon" onclick="myFunction()">
    <i class="fa fa-bars"></i>
  </a>
 

  </div>  
  
</div>

<div> <h5 class="text-1">{{ user.username }}</h5>  </div>
  <div><img src="{{ user.profile.profile_picture.url }}" alt="Current Profile Picture" class="current-image"></div>


</div>

<script>
function myFunction() {
  var x = document.getElementById("myTopnav");
  if (x.className === "topnav") {
    x.className += " responsive";
  } else {
    x.className = "topnav";
  }
}
</script>

</body>
</html>

    <hr>

    {% block content %}
    {% endblock %}

</body>
</html>
