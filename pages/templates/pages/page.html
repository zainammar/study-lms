{% extends "base.html" %}
{% load static %}

{% block title %}{{ page.title }}{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/pages.css' %}">
{% endblock %}

{% block content %}
<div class="page-container">
    <h1 class="page-title">{{ page.title }}</h1>

    <div class="page-content">
        {{ page.content|safe }}
    </div>
</div>
{% endblock %}
